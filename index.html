<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Universe - Nana ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #ff69b4; --space: #050505; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--space); 
            color: white; 
            font-family: 'Quicksand', sans-serif; 
            overflow: hidden; 
            height: 100vh;
            perspective: 1000px;
        }

        /* Background Bintang Bergerak */
        #stars-container {
            position: fixed; inset: 0;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            z-index: -1;
        }

        .star {
            position: absolute; background: white; border-radius: 50%;
            animation: moveStar linear infinite;
        }
        @keyframes moveStar {
            from { transform: translateZ(0) translateY(0); opacity: 1; }
            to { transform: translateZ(-1000px) translateY(-100vh); opacity: 0; }
        }

        /* Tombol Start */
        #btn-start {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 999; padding: 15px 30px; border-radius: 50px;
            background: var(--pink); border: none; color: white;
            font-weight: bold; cursor: pointer; box-shadow: 0 0 20px var(--pink);
        }

        /* Container Galeri Melayang */
        #universe {
            display: none; width: 100%; height: 100%;
            position: relative; overflow-y: auto; overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .space-text {
            text-align: center; margin-top: 100px; font-family: 'Pacifico';
            font-size: 2rem; color: var(--pink); text-shadow: 0 0 10px var(--pink);
        }

        /* Galeri Foto Berjejer */
        .gallery {
            display: flex; flex-direction: column; align-items: center;
            gap: 150px; padding: 100px 0;
        }

        .photo-frame {
            width: 250px; height: 350px; background: rgba(255,255,255,0.1);
            border: 2px solid var(--pink); border-radius: 15px;
            overflow: hidden; backdrop-filter: blur(5px);
            transform-style: preserve-3d; transition: 0.5s;
            box-shadow: 0 0 30px rgba(255,105,180,0.3);
        }

        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }

        .caption { padding: 10px; text-align: center; font-size: 0.9rem; }

        /* Audio Player Tersembunyi */
        #lagu { display: none; }
    </style>
</head>
<body>

    <div id="stars-container"></div>
    <button id="btn-start" onclick="mulaiUniverse()">Masuk ke Universe Nana ❤️</button>

    <audio id="lagu" loop>
        <source src="ssstik.io_1775638977142.mp3" type="audio/mpeg">
    </audio>

    <div id="universe">
        <div class="space-text">You are my whole Universe...</div>
        
        <div class="gallery">
            <!-- Ganti Nama File Foto di Sini -->
            <div class="photo-frame" style="transform: rotate(-5deg)">
                <img src="IMG-20260405-WA0045.jpg">
                <div class="caption">Cantiknya duniaku ❤️</div>
            </div>

            <div class="photo-frame" style="transform: rotate(5deg)">
                <img src="IMG-20260320-WA0065.jpg">
                <div class="caption">My Favorite Star ✨</div>
            </div>

            <div class="photo-frame" style="transform: rotate(-3deg)">
                <img src="IMG-20260321-WA0007.jpg">
                <div class="caption">Semesta bersamamu... 🌸</div>
            </div>

            <div class="photo-frame">
                <img src="IMG-20260314-WA0004.jpg">
                <div class="caption">I Love You to the moon and back! 🌙</div>
            </div>
        </div>
    </div>

    <script>
        // Bikin Bintang Otomatis
        const starsCount = 150;
        const container = document.getElementById('stars-container');
        for (let i = 0; i < starsCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.animationDuration = Math.random() * 3 + 2 + 's';
            star.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(star);
        }

        function mulaiUniverse() {
            document.getElementById('btn-start').style.display = 'none';
            document.getElementById('lagu').play();
            const uni = document.getElementById('universe');
            uni.style.display = 'block';
            
            // Efek Zoom In saat masuk
            uni.style.animation = 'zoomIn 2s forwards';
        }

        // Efek gerak foto saat scroll (Parallax)
        const universe = document.getElementById('universe');
        universe.addEventListener('scroll', () => {
            const frames = document.querySelectorAll('.photo-frame');
            frames.forEach((frame, i) => {
                const speed = (i + 1) * 0.1;
                const rect = frame.getBoundingClientRect();
                if(rect.top < window.innerHeight && rect.bottom > 0) {
                    frame.style.transform = `translateY(${rect.top * speed}px) rotate(${i % 2 === 0 ? -5 : 5}deg)`;
                }
            });
        });
    </script>
</body>
</html>
